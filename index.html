<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Angler's Bounty - Visual & Gameplay Enhanced</title>
    <style>
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 720px;
            background: #111;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Flash Overlay */
        #flash-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            transition: opacity 0.1s ease-out;
        }

        /* Top HUD */
        .top-hud {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            z-index: 20;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
        }
        .hud-badge {
            background: rgba(255,255,255,0.15);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }
        .shop-btn {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255,152,0,0.4);
        }

        /* Main Canvas */
        canvas { width: 100%; height: 100%; touch-action: none; }

        /* HUD Reeling overlay */
        #reeling-ui {
            position: absolute;
            top: 60px; left: 16px; right: 16px;
            display: none;
            flex-direction: column;
            gap: 8px;
            z-index: 15;
            background: rgba(0,0,0,0.6);
            padding: 12px;
            border-radius: 12px;
            backdrop-filter: blur(6px);
        }
        .metric-row { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; }
        .bar-container {
            width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; position: relative;
        }
        .bar-fill { height: 100%; width: 0%; transition: width 0.05s linear; }
        #tension-bar { background: linear-gradient(90deg, #4CAF50, #FFEB3B, #F44336); }
        #distance-bar { background: #2196F3; }

        /* QTE Jerk Button */
        #qte-btn {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #FF9800; color: #000;
            border: 3px solid #FFF; padding: 14px 28px;
            font-size: 20px; font-weight: 900; border-radius: 40px;
            box-shadow: 0 0 20px #FF9800; cursor: pointer; z-index: 30;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Controls Bottom */
        .controls {
            position: absolute;
            bottom: 20px; left: 0; right: 0;
            display: flex; justify-content: center; z-index: 20;
        }
        .btn-main {
            background: linear-gradient(135deg, #d82d8b, #a50064);
            color: white; border: none; padding: 16px 50px;
            font-size: 18px; font-weight: bold; border-radius: 30px;
            box-shadow: 0 6px 20px rgba(216, 45, 139, 0.5); cursor: pointer;
        }
        .btn-main:active { transform: scale(0.95); }

        /* Modals (Result & Shop) */
        .modal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 40; text-align: center; padding: 20px;
        }
        .fish-card {
            background: rgba(255,255,255,0.08); border: 2px solid #ffd700;
            border-radius: 16px; padding: 16px; margin: 16px 0; width: 85%;
        }
        .shop-item {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; background: rgba(255,255,255,0.1); padding: 12px;
            border-radius: 10px; margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="flash-overlay"></div>

    <!-- HUD -->
    <div class="top-hud">
        <div class="hud-badge">⚖️ Tổng Kg: <span id="total-kg" style="color: #4CAF50;">0.0</span> kg</div>
        <button class="shop-btn" id="openShopBtn">🛒 Cửa Hàng</button>
    </div>

    <!-- Reeling UI -->
    <div id="reeling-ui">
        <div class="metric-row">
            <span>Khoảng cách: <span id="dist-text">100</span>m</span>
            <span id="fish-status" style="color: #4CAF50;">Bình thường</span>
        </div>
        <div class="bar-container"><div id="distance-bar" class="bar-fill"></div></div>

        <div class="metric-row" style="margin-top: 4px;">
            <span>Sức căng dây:</span>
            <span id="tension-text">0%</span>
        </div>
        <div class="bar-container"><div id="tension-bar" class="bar-fill"></div></div>
    </div>

    <!-- QTE Button -->
    <button id="qte-btn">⚡ GIẬT CẦN!</button>

    <!-- Canvas Engine -->
    <canvas id="gameCanvas" width="420" height="720"></canvas>

    <!-- Control Button -->
    <div class="controls">
        <button id="mainBtn" class="btn-main">CĂN LỰC CÂU</button>
    </div>

    <!-- Modal Kết Quả -->
    <div id="resultModal" class="modal">
        <h1 id="res-title" style="color: #ffd700;">BẮT ĐƯỢC CÁ!</h1>
        <div class="fish-card">
            <h2 id="res-fish-name">Cá Hồi Cam</h2>
            <p id="res-fish-rarity" style="color: #FF9800; font-weight: bold; margin: 6px 0;">Epic</p>
            <h3 id="res-fish-weight" style="font-size: 24px; color: #4CAF50;">12.5 kg</h3>
        </div>
        <button id="restartBtn" class="btn-main">CÂU TIẾP</button>
    </div>

    <!-- Modal Cửa Hàng -->
    <div id="shopModal" class="modal">
        <h2 style="color: #FF9800; margin-bottom: 16px;">🛒 CỬA HÀNG MOMO</h2>
        <div class="shop-item">
            <div style="text-align: left;">
                <div style="font-weight: bold;">Voucher Tiki 20k</div>
                <div style="font-size: 12px; color: #aaa;">Yêu cầu: 15.0 kg cá</div>
            </div>
            <button class="shop-btn" onclick="buyItem(15)">Đổi liền</button>
        </div>
        <div class="shop-item">
            <div style="text-align: left;">
                <div style="font-weight: bold;">Mã Dự Thưởng 1 Triệu</div>
                <div style="font-size: 12px; color: #aaa;">Yêu cầu: 30.0 kg cá</div>
            </div>
            <button class="shop-btn" onclick="buyItem(30)">Đổi liền</button>
        </div>
        <button id="closeShopBtn" class="btn-main" style="margin-top: 15px; padding: 10px 30px;">ĐÓNG</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const mainBtn = document.getElementById('mainBtn');
    const qteBtn = document.getElementById('qte-btn');
    const reelingUI = document.getElementById('reeling-ui');
    const distText = document.getElementById('dist-text');
    const tensionText = document.getElementById('tension-text');
    const fishStatusEl = document.getElementById('fish-status');
    const distBar = document.getElementById('distance-bar');
    const tensionBar = document.getElementById('tension-bar');
    const flashOverlay = document.getElementById('flash-overlay');
    const totalKgEl = document.getElementById('total-kg');

    // Game States
    const STATES = { IDLE: 'IDLE', POWER_SELECT: 'POWER_SELECT', CASTING: 'CASTING', BITE: 'BITE', REELING: 'REELING', WIN: 'WIN', LOSE: 'LOSE' };
    let currentState = STATES.IDLE;

    // Persistent Metrics
    let totalKg = 0.0;

    // Power Arc Bar Variables
    let powerAngle = Math.PI; // 180 deg to 0 deg
    let powerSpeed = 0.04;
    let powerDir = -1;
    let selectedBonus = 0; // 0: Normal, 1: Perfect, 2: Accurate

    // Gameplay Tuning (10-15s Balance)
    let distance = 100;
    let tension = 0;
    let isHolding = false;
    let currentFish = null;
    let qteActive = false;
    let qteTimer = null;

    // Visual Animation Variables
    let rodJerkOffset = 0;
    let lineSnapAnim = 0;
    let fishOrbitAngle = 0;
    let rippleRadius = 0;

    // Database Cá & Trọng Lượng
    const FISH_DATABASE = [
        { name: "Cá Rô Đồng", rarity: "Thường", color: "#81C784", chance: 0.70, baseKg: 1.5, kgVar: 2.0 },
        { name: "Cá Chép Vàng", rarity: "Chính Xác", color: "#64B5F6", chance: 0.90, baseKg: 5.0, kgVar: 4.0 },
        { name: "Cá Hồi Đỏ", rarity: "Hiếm", color: "#BA68C8", chance: 0.98, baseKg: 12.0, kgVar: 6.0 },
        { name: "Rồng Biển MoMo", rarity: "Huyền thoại", color: "#FFD54F", chance: 1.00, baseKg: 25.0, kgVar: 15.0 }
    ];

    function triggerFeedback(isFlash = false) {
        if (navigator.vibrate) navigator.vibrate(40);
        if (isFlash) {
            flashOverlay.style.opacity = '0.8';
            setTimeout(() => flashOverlay.style.opacity = '0', 100);
        }
    }

    // Input Control
    mainBtn.addEventListener('mousedown', () => handleMainPress(true));
    mainBtn.addEventListener('mouseup', () => handleMainPress(false));
    mainBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleMainPress(true); });
    mainBtn.addEventListener('touchend', (e) => { e.preventDefault(); handleMainPress(false); });

    function handleMainPress(pressing) {
        isHolding = pressing;
        if (!pressing) return;

        if (currentState === STATES.IDLE) {
            currentState = STATES.POWER_SELECT;
            mainBtn.textContent = "CHỌN LỰC!";
        } else if (currentState === STATES.POWER_SELECT) {
            // Xác định vùng lực căn được
            evaluatePowerArc();
            startCastingPhase();
        }
    }

    // Tính toán vùng lực Vòng cung
    function evaluatePowerArc() {
        const normalized = (Math.PI - powerAngle) / Math.PI; // 0 to 1
        if (normalized >= 0.45 && normalized <= 0.55) {
            selectedBonus = 0.3; // Hoàn hảo (10%)
            triggerFeedback(true);
        } else if (normalized >= 0.35 && normalized <= 0.65) {
            selectedBonus = 0.15; // Chính xác (20%)
        } else {
            selectedBonus = 0; // Thường (70%)
        }
    }

    function startCastingPhase() {
        currentState = STATES.CASTING;
        mainBtn.style.display = 'none';

        setTimeout(() => {
            if (currentState === STATES.CASTING) triggerFishBite();
        }, 1500);
    }

    function triggerFishBite() {
        currentState = STATES.BITE;
        rodJerkOffset = 25; // Giật cần animation
        triggerFeedback(true);

        // Chọn cá dựa trên điểm Bonus lực
        const rand = Math.random() - selectedBonus;
        currentFish = FISH_DATABASE.find(f => rand <= f.chance) || FISH_DATABASE[0];

        setTimeout(() => {
            startReelingPhase();
        }, 600);
    }

    function startReelingPhase() {
        currentState = STATES.REELING;
        distance = 100;
        tension = 0;
        reelingUI.style.display = 'flex';
        mainBtn.style.display = 'block';
        mainBtn.textContent = "GIỮ ĐỂ THU CẦN";
    }

    // Trigger QTE Giật Cần
    function triggerQTE() {
        if (qteActive || currentState !== STATES.REELING) return;
        qteActive = true;
        qteBtn.style.transform = 'translate(-50%, -50%) scale(1)';

        qteTimer = setTimeout(() => {
            if (qteActive) {
                qteActive = false;
                qteBtn.style.transform = 'translate(-50%, -50%) scale(0)';
                distance += 8;
                tension += 20;
                fishStatusEl.textContent = "HỤT GIẬT!";
                fishStatusEl.style.color = "#F44336";
            }
        }, 900);
    }

    qteBtn.addEventListener('click', () => {
        if (!qteActive) return;
        clearTimeout(qteTimer);
        qteActive = false;
        qteBtn.style.transform = 'translate(-50%, -50%) scale(0)';
        triggerFeedback(true);

        distance = Math.max(0, distance - 8);
        tension = Math.max(0, tension - 15);
        fishStatusEl.textContent = "CÁ BỊ CHOÁNG!";
        fishStatusEl.style.color = "#FFEB3B";
    });

    // Loop logic chính
    function update() {
        if (currentState === STATES.POWER_SELECT) {
            powerAngle += powerSpeed * powerDir;
            if (powerAngle <= 0 || powerAngle >= Math.PI) powerDir *= -1;
        }
        else if (currentState === STATES.REELING) {
            // Cân bằng gameplay: Thu dây trong 10-15 giây
            if (isHolding) {
                distance -= 0.28; // Tốc độ thu cần đã được tối ưu
                tension += 0.32;
            } else {
                tension -= 0.6; // Giảm căng khi nhả
            }

            // Cá ngẫu nhiên vùng vẫy
            if (Math.random() < 0.02 && !qteActive) {
                triggerQTE();
            }

            // Boundary
            distance = Math.max(0, distance);
            tension = Math.max(0, Math.min(100, tension));

            // Cập nhật UI
            distText.textContent = Math.ceil(distance);
            tensionText.textContent = `${Math.ceil(tension)}%`;
            distBar.style.width = `${(distance / 100) * 100}%`;
            tensionBar.style.width = `${tension}%`;

            // Thắng / Thua
            if (distance <= 0) finishGame(true);
            else if (tension >= 100) finishGame(false);
        }

        // Decay Animations
        if (rodJerkOffset > 0) rodJerkOffset *= 0.85;
    }

    function finishGame(isSuccess) {
        reelingUI.style.display = 'none';
        mainBtn.style.display = 'none';
        qteBtn.style.transform = 'translate(-50%, -50%) scale(0)';

        if (isSuccess) {
            currentState = STATES.WIN;
            triggerFeedback(true);

            // Tính số Kg dựa trên độ hiếm
            const caughtKg = parseFloat((currentFish.baseKg + Math.random() * currentFish.kgVar).toFixed(1));
            totalKg += caughtKg;
            totalKgEl.textContent = totalKg.toFixed(1);

            document.getElementById('res-title').textContent = "BẮT ĐƯỢC CÁ!";
            document.getElementById('res-title').style.color = "#ffd700";
            document.getElementById('res-fish-name').textContent = currentFish.name;
            document.getElementById('res-fish-rarity').textContent = currentFish.rarity;
            document.getElementById('res-fish-rarity').style.color = currentFish.color;
            document.getElementById('res-fish-weight').textContent = `+${caughtKg} kg`;
        } else {
            currentState = STATES.LOSE;
            lineSnapAnim = 100; // Trigger hiệu ứng đứt dây
            document.getElementById('res-title').textContent = "ĐỨT DÂY CÂU!";
            document.getElementById('res-title').style.color = "#F44336";
            document.getElementById('res-fish-name').textContent = "Cá đã trốn mất";
            document.getElementById('res-fish-rarity').textContent = "Thất bại";
            document.getElementById('res-fish-weight').textContent = "0 kg";
        }

        setTimeout(() => {
            document.getElementById('resultModal').style.display = 'flex';
        }, 800);
    }

    // -------------------------------------------------------------
    // CANVAS GRAPHICS & RENDER ENGINE
    // -------------------------------------------------------------
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Render Mặt Hồ Nước & Gợn Sóng
        ctx.fillStyle = "#112233";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Vẽ các vòng gợn sóng nước
        rippleRadius = (rippleRadius + 0.3) % 40;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(canvas.width / 2, 350, rippleRadius + 20, 0, Math.PI * 2);
        ctx.stroke();

        // 2. Render Cá Bơi Vòng Quay khi Reeling
        if (currentState === STATES.REELING) {
            fishOrbitAngle += 0.05;
            const orbitX = canvas.width / 2 + Math.cos(fishOrbitAngle) * (distance * 1.2);
            const orbitY = 350 + Math.sin(fishOrbitAngle) * (distance * 0.6);

            // Bóng cá dưới nước
            ctx.fillStyle = currentFish ? currentFish.color : "rgba(0,0,0,0.5)";
            ctx.beginPath();
            ctx.ellipse(orbitX, orbitY, 14, 6, fishOrbitAngle, 0, Math.PI * 2);
            ctx.fill();

            // Dây câu kết nối với cá
            ctx.strokeStyle = tension > 70 ? "#F44336" : "rgba(255,255,255,0.6)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 600 - rodJerkOffset);
            ctx.lineTo(orbitX, orbitY);
            ctx.stroke();
        }

        // 3. Render Thanh Lực Vòng Cung (Power Arc Bar)
        if (currentState === STATES.POWER_SELECT) {
            const centerX = canvas.width / 2;
            const centerY = 500;
            const radius = 90;

            // Vùng Thường 70%
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI, 0, false);
            ctx.lineWidth = 18; ctx.strokeStyle = "#4CAF50"; ctx.stroke();

            // Vùng Chính Xác 20%
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI * 0.65, Math.PI * 0.35, true);
            ctx.lineWidth = 18; ctx.strokeStyle = "#2196F3"; ctx.stroke();

            // Vùng Hoàn Hảo 10%
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI * 0.55, Math.PI * 0.45, true);
            ctx.lineWidth = 18; ctx.strokeStyle = "#FFD700"; ctx.stroke();

            // Kim chỉ lực
            const ptrX = centerX + Math.cos(powerAngle) * radius;
            const ptrY = centerY - Math.sin(powerAngle) * radius;
            ctx.fillStyle = "#FFF"; ctx.beginPath();
            ctx.arc(ptrX, ptrY, 12, 0, Math.PI * 2); ctx.fill();
        }

        // 4. Render Cần Cầu & Animation
        const rodBaseX = canvas.width / 2;
        const rodBaseY = canvas.height + 20;
        const rodTipX = canvas.width / 2;
        const rodTipY = 580 - rodJerkOffset;

        ctx.strokeStyle = "#8D6E63";
        ctx.lineWidth = 8; ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(rodBaseX, rodBaseY);
        ctx.lineTo(rodTipX, rodTipY);
        ctx.stroke();

        // 5. Render Hiệu Ứng Đứt Dây
        if (lineSnapAnim > 0) {
            lineSnapAnim -= 2;
            ctx.strokeStyle = "#F44336";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(rodTipX, rodTipY);
            ctx.lineTo(rodTipX - 30, rodTipY - 60);
            ctx.moveTo(rodTipX, rodTipY);
            ctx.lineTo(rodTipX + 40, rodTipY - 40);
            ctx.stroke();
        }

        requestAnimationFrame(draw);
    }

    // Modal Events
    document.getElementById('restartBtn').addEventListener('click', () => {
        document.getElementById('resultModal').style.display = 'none';
        currentState = STATES.IDLE;
        mainBtn.style.display = 'block';
        mainBtn.textContent = "CĂN LỰC CÂU";
    });

    document.getElementById('openShopBtn').addEventListener('click', () => {
        document.getElementById('shopModal').style.display = 'flex';
    });
    document.getElementById('closeShopBtn').addEventListener('click', () => {
        document.getElementById('shopModal').style.display = 'none';
    });

    function buyItem(requiredKg) {
        if (totalKg >= requiredKg) {
            totalKg -= requiredKg;
            totalKgEl.textContent = totalKg.toFixed(1);
            alert("Đổi quà thành công! Mã Voucher đã gửi vào Ví MoMo.");
        } else {
            alert("Bạn chưa đủ số Kg cá để đổi quà này!");
        }
    }

    // Game Loop Init
    function loop() {
        update();
        draw();
    }
    loop();
</script>
</body>
</html>
