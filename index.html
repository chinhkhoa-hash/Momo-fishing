<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Angler's Bounty - MoMo Edition</title>
    <style>
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 750px;
            background: #101c2c;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top HUD */
        .top-hud {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            z-index: 20;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
        }
        .hud-badge {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }
        .shop-btn {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white; border: none; padding: 7px 16px;
            border-radius: 20px; font-weight: bold; font-size: 13px;
            cursor: pointer; box-shadow: 0 4px 12px rgba(255,152,0,0.4);
        }

        /* Canvas Engine */
        canvas { width: 100%; height: 100%; touch-action: none; }

        /* Custom Reel Control Button (ẢNH 3 & 4) */
        #reel-control-wrapper {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 140px;
            z-index: 25;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .reel-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffb74d 0%, #f57c00 70%, #e65100 100%);
            border: 4px solid #fff;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6), inset 0 2px 5px rgba(255,255,255,0.8);
            color: #fff;
            font-weight: 900;
            font-size: 15px;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            transition: transform 0.1s;
        }
        .reel-btn:active { transform: scale(0.92); }

        /* Right Stats Card (Chuẩn theo ảnh 3 & 4) */
        .stats-card {
            position: absolute;
            bottom: 40px;
            right: 12px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 11px;
            color: #ccc;
            z-index: 20;
            text-align: right;
            backdrop-filter: blur(4px);
        }
        .stats-card div span { color: #fff; font-weight: bold; }

        /* Quick Time Event (Giật Cá) */
        #qte-btn {
            position: absolute;
            top: 38%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #FF1744, #D50000);
            color: #FFF; border: 3px solid #FFF; padding: 14px 28px;
            font-size: 20px; font-weight: 900; border-radius: 40px;
            box-shadow: 0 0 25px #FF1744; cursor: pointer; z-index: 30;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Modal Phần Thưởng (THIẾT KẾ THEO ẢNH 5) */
        .modal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 15, 25, 0.92); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; text-align: center; padding: 20px;
        }
        .banner-title {
            background: linear-gradient(135deg, #FFB300, #F57C00);
            color: #fff; font-weight: 900; font-size: 22px;
            padding: 10px 36px; border-radius: 12px;
            border: 2px solid #FFE082;
            box-shadow: 0 6px 20px rgba(255,179,0,0.4);
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        .fish-preview-box {
            position: relative;
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .kg-badge {
            position: absolute;
            top: -15px; right: -20px;
            background: #d82d8b;
            color: #fff; font-weight: 900; font-size: 14px;
            padding: 8px 12px; border-radius: 20px;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .rewards-row {
            display: flex; gap: 12px; margin: 20px 0;
        }
        .reward-icon {
            width: 55px; height: 55px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; position: relative;
        }
        .reward-qty {
            position: absolute; bottom: 2px; right: 4px;
            font-size: 10px; font-weight: bold; color: #FFD54F;
        }

        .btn-action {
            background: linear-gradient(135deg, #00E676, #00C853);
            color: #fff; border: none; padding: 14px 45px;
            font-size: 16px; font-weight: bold; border-radius: 30px;
            box-shadow: 0 6px 20px rgba(0,230,118,0.4); cursor: pointer;
            margin-top: 15px;
        }

        /* Shop Item Modal */
        .shop-item {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; background: rgba(255,255,255,0.08); padding: 12px;
            border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Top HUD -->
    <div class="top-hud">
        <div class="hud-badge">⚖️ Tổng Kg: <span id="total-kg" style="color: #4CAF50;">0.0</span> kg</div>
        <button class="shop-btn" id="openShopBtn">🛒 Cửa Hàng</button>
    </div>

    <!-- Right Stats Card (ẢNH 3 & 4) -->
    <div class="stats-card">
        <div>Tổng đã câu: <span id="stat-total">0.00 KG</span></div>
        <div>Mục tiêu tới: <span id="stat-next">15.00 KG</span></div>
        <div style="color: #FFB300; margin-top: 2px;">Cần câu: <span>Cần MoMo Pro</span></div>
    </div>

    <!-- Quick Time Event Button -->
    <button id="qte-btn">⚡ GIẬT CẦN!</button>

    <!-- Canvas Engine -->
    <canvas id="gameCanvas" width="420" height="750"></canvas>

    <!-- Nút Bấm Tròn Trung Tâm (ẢNH 3 & 4) -->
    <div id="reel-control-wrapper">
        <button id="mainBtn" class="reel-btn">Tap to cast rod</button>
    </div>

    <!-- MODAL PHẦN THƯỞNG KHI BẮT ĐƯỢC CÁ (ẢNH 5) -->
    <div id="resultModal" class="modal">
        <div class="banner-title" id="res-banner">Congratulations</div>
        
        <div style="font-size: 13px; color: #aaa; margin-bottom: 5px;">Cá đã cắn câu!</div>
        
        <div class="fish-preview-box">
            <div class="kg-badge" id="res-fish-kg">5.90 KG</div>
            <div id="res-fish-avatar" style="font-size: 70px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));">🐟</div>
            <div id="res-fish-rarity" style="color: #BA68C8; font-weight: bold; margin-top: 8px;">Epic</div>
            <h2 id="res-fish-name" style="color: #fff; font-size: 22px;">Wrasse</h2>
        </div>

        <div style="font-size: 12px; color: #888; margin-top: 10px;">Phần thưởng nhận được:</div>
        <div class="rewards-row">
            <div class="reward-icon">🎁<span class="reward-qty">x1</span></div>
            <div class="reward-icon">🎫<span class="reward-qty">x5</span></div>
            <div class="reward-icon">🐟<span class="reward-qty" id="res-reward-kg">+5.9</span></div>
        </div>

        <button id="restartBtn" class="btn-action">CÂU TIẾP</button>
    </div>

    <!-- MODAL CỬA HÀNG -->
    <div id="shopModal" class="modal">
        <h2 style="color: #FF9800; margin-bottom: 20px;">🛒 CỬA HÀNG MOMO</h2>
        <div class="shop-item">
            <div style="text-align: left;">
                <div style="font-weight: bold;">Voucher Tiki 20k</div>
                <div style="font-size: 12px; color: #aaa;">Yêu cầu: 15.0 kg cá</div>
            </div>
            <button class="shop-btn" onclick="buyItem(15)">Đổi quà</button>
        </div>
        <div class="shop-item">
            <div style="text-align: left;">
                <div style="font-weight: bold;">Mã Thưởng 1 Triệu</div>
                <div style="font-size: 12px; color: #aaa;">Yêu cầu: 30.0 kg cá</div>
            </div>
            <button class="shop-btn" onclick="buyItem(30)">Đổi quà</button>
        </div>
        <button id="closeShopBtn" class="btn-action" style="background: #555; margin-top: 15px;">ĐÓNG</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const mainBtn = document.getElementById('mainBtn');
    const qteBtn = document.getElementById('qte-btn');
    const totalKgEl = document.getElementById('total-kg');
    const statTotalEl = document.getElementById('stat-total');

    // Game States
    const STATES = { IDLE: 'IDLE', POWER_SELECT: 'POWER_SELECT', CASTING: 'CASTING', BITE: 'BITE', REELING: 'REELING', WIN: 'WIN', LOSE: 'LOSE' };
    let currentState = STATES.IDLE;

    // Persisted Data
    let totalKg = 0.0;

    // Power Arc Variables (ẢNH 3)
    let powerAngle = Math.PI; // 180 to 0 degrees
    let powerSpeed = 0.045;
    let powerDir = -1;
    let selectedBonus = 0;

    // Reeling & Tension Variables (ẢNH 4)
    let distance = 100;
    let tension = 0;
    let isHolding = false;
    let currentFish = null;
    let qteActive = false;
    let qteTimer = null;

    // Fish Database (Cấu hình chuẩn theo mẫu)
    const FISH_DATABASE = [
        { name: "Cá Rô Đồng", rarity: "Common", color: "#81C784", chance: 0.70, baseKg: 1.5, kgVar: 2.0, avatar: "🐟" },
        { name: "Cá Chép Vàng", rarity: "Rare", color: "#64B5F6", chance: 0.90, baseKg: 4.0, kgVar: 3.0, avatar: "🐠" },
        { name: "Wrasse", rarity: "Epic", color: "#BA68C8", chance: 0.98, baseKg: 5.9, kgVar: 4.0, avatar: "🦈" },
        { name: "Rồng Biển MoMo", rarity: "Legendary", color: "#FFD54F", chance: 1.00, baseKg: 15.0, kgVar: 10.0, avatar: "🐉" }
    ];

    // Listeners for Control Button
    mainBtn.addEventListener('mousedown', () => handleMainPress(true));
    mainBtn.addEventListener('mouseup', () => handleMainPress(false));
    mainBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleMainPress(true); });
    mainBtn.addEventListener('touchend', (e) => { e.preventDefault(); handleMainPress(false); });

    function handleMainPress(pressing) {
        isHolding = pressing;
        if (!pressing) return;

        if (currentState === STATES.IDLE) {
            currentState = STATES.POWER_SELECT;
            mainBtn.textContent = "TAP TO CAST";
        } else if (currentState === STATES.POWER_SELECT) {
            // Chốt lực vòng cung
            evaluatePowerArc();
            startCastingPhase();
        }
    }

    function evaluatePowerArc() {
        const norm = (Math.PI - powerAngle) / Math.PI; // 0..1
        if (norm >= 0.42 && norm <= 0.58) selectedBonus = 0.3; // Perfect
        else if (norm >= 0.25 && norm <= 0.75) selectedBonus = 0.15; // Accurate
        else selectedBonus = 0; // Normal
    }

    function startCastingPhase() {
        currentState = STATES.CASTING;
        mainBtn.style.pointerEvents = "none";
        mainBtn.textContent = "WAITING...";

        setTimeout(() => {
            if (currentState === STATES.CASTING) triggerFishBite();
        }, 1200);
    }

    function triggerFishBite() {
        currentState = STATES.BITE;
        if (navigator.vibrate) navigator.vibrate(80);

        // RNG Cá dựa vào bonus lực
        const rand = Math.random() - selectedBonus;
        currentFish = FISH_DATABASE.find(f => rand <= f.chance) || FISH_DATABASE[0];

        setTimeout(() => {
            startReelingPhase();
        }, 500);
    }

    function startReelingPhase() {
        currentState = STATES.REELING;
        distance = 100;
        tension = 0;
        mainBtn.style.pointerEvents = "auto";
        mainBtn.textContent = "Hold down to reel in";
    }

    // Quick Time Event (Giật Cần)
    function triggerQTE() {
        if (qteActive || currentState !== STATES.REELING) return;
        qteActive = true;
        qteBtn.style.transform = 'translate(-50%, -50%) scale(1)';

        qteTimer = setTimeout(() => {
            if (qteActive) {
                qteActive = false;
                qteBtn.style.transform = 'translate(-50%, -50%) scale(0)';
                distance += 8;
                tension += 25;
            }
        }, 850);
    }

    qteBtn.addEventListener('click', () => {
        if (!qteActive) return;
        clearTimeout(qteTimer);
        qteActive = false;
        qteBtn.style.transform = 'translate(-50%, -50%) scale(0)';
        distance = Math.max(0, distance - 10);
        tension = Math.max(0, tension - 20);
    });

    // Loop logic cập nhật trạng thái
    function update() {
        // Fix Bug 1: Chạy animation thanh lực vòng cung
        if (currentState === STATES.POWER_SELECT) {
            powerAngle += powerSpeed * powerDir;
            if (powerAngle <= 0 || powerAngle >= Math.PI) powerDir *= -1;
        }
        // Fix Bug 2: Thu cần và cập nhật sức căng dây / khoảng cách
        else if (currentState === STATES.REELING) {
            if (isHolding) {
                distance -= 0.32; // Giảm khoảng cách (10-15s xong)
                tension += 0.35;  // Tăng căng dây
            } else {
                tension -= 0.65; // Giảm căng dây khi thả nút
            }

            if (Math.random() < 0.018 && !qteActive) triggerQTE();

            distance = Math.max(0, distance);
            tension = Math.max(0, Math.min(100, tension));

            if (distance <= 0) finishGame(true);
            else if (tension >= 100) finishGame(false);
        }
    }

    // Fix Bug 3: Hiển thị Màn hình Victory
    function finishGame(isSuccess) {
        mainBtn.style.pointerEvents = "auto";

        if (isSuccess) {
            currentState = STATES.WIN;
            const caughtKg = parseFloat((currentFish.baseKg + Math.random() * currentFish.kgVar).toFixed(2));
            totalKg += caughtKg;
            
            totalKgEl.textContent = totalKg.toFixed(1);
            statTotalEl.textContent = `${totalKg.toFixed(2)} KG`;

            // Cập nhật Modal Victory (Ảnh 5)
            document.getElementById('res-banner').textContent = "Congratulations";
            document.getElementById('res-fish-kg').textContent = `${caughtKg} KG`;
            document.getElementById('res-fish-avatar').textContent = currentFish.avatar;
            document.getElementById('res-fish-rarity').textContent = currentFish.rarity;
            document.getElementById('res-fish-rarity').style.color = currentFish.color;
            document.getElementById('res-fish-name').textContent = currentFish.name;
            document.getElementById('res-reward-kg').textContent = `+${caughtKg}`;

            document.getElementById('resultModal').style.display = 'flex';
        } else {
            currentState = STATES.LOSE;
            alert("Đứt dây câu! Cá đã thoát.");
            resetToIdle();
        }
    }

    function resetToIdle() {
        currentState = STATES.IDLE;
        mainBtn.textContent = "Tap to cast rod";
    }

    // -------------------------------------------------------------
    // RENDER CANVAS (GIAO DIỆN CHUẨN ẢNH 3 & 4)
    // -------------------------------------------------------------
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Background Mặt Biển Hoàng Hôn / Bình Minh (ẢNH 3 & 4)
        let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#f1885c');
        gradient.addColorStop(0.35, '#c5536e');
        gradient.addColorStop(0.7, '#48356b');
        gradient.addColorStop(1, '#1d2343');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Mặt Trời & Ngọn Hải Đăng Phía Xa
        ctx.fillStyle = "rgba(255, 235, 190, 0.8)";
        ctx.beginPath();
        ctx.arc(canvas.width / 2, 140, 50, 0, Math.PI * 2);
        ctx.fill();

        // Cần Cầu 3D Silhouette
        ctx.strokeStyle = "#4fc3f7";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(80, canvas.height);
        ctx.lineTo(170, 220);
        ctx.stroke();

        // 1. DÂY CÂU & PHAO
        if (currentState === STATES.CASTING || currentState === STATES.BITE || currentState === STATES.REELING) {
            ctx.strokeStyle = "rgba(255,255,255,0.7)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(170, 220);
            ctx.lineTo(canvas.width / 2, 320);
            ctx.stroke();

            // Phao câu
            ctx.fillStyle = currentState === STATES.BITE ? "#FF1744" : "#FF9800";
            ctx.beginPath();
            ctx.arc(canvas.width / 2, 320, 8, 0, Math.PI * 2);
            ctx.fill();
        }

        // 2. VẼ THANH LỰC VÒNG CUNG (Giai đoạn POWER_SELECT - ẢNH 3)
        if (currentState === STATES.POWER_SELECT) {
            const cx = canvas.width / 2;
            const cy = 645;
            const r = 62;

            // Vùng Thường (Xanh Lá)
            ctx.beginPath();
            ctx.arc(cx, cy, r, Math.PI, 0, false);
            ctx.lineWidth = 14; ctx.strokeStyle = "#4CAF50"; ctx.stroke();

            // Vùng Chính Xác (Xanh Dương)
            ctx.beginPath();
            ctx.arc(cx, cy, r, Math.PI * 0.75, Math.PI * 0.25, true);
            ctx.lineWidth = 14; ctx.strokeStyle = "#2196F3"; ctx.stroke();

            // Vùng Hoàn Hảo (Vàng)
            ctx.beginPath();
            ctx.arc(cx, cy, r, Math.PI * 0.58, Math.PI * 0.42, true);
            ctx.lineWidth = 14; ctx.strokeStyle = "#FFD700"; ctx.stroke();

            // Kim Chỉ Lực
            const px = cx + Math.cos(powerAngle) * r;
            const py = cy - Math.sin(powerAngle) * r;
            ctx.fillStyle = "#FFF";
            ctx.beginPath(); ctx.arc(px, py, 9, 0, Math.PI * 2); ctx.fill();
        }

        // 3. VẼ THANH SỨC CĂNG DÂY VÒNG CUNG (Giai đoạn REELING - ẢNH 4)
        if (currentState === STATES.REELING) {
            const cx = canvas.width / 2;
            const cy = 645;
            const r = 62;

            // Arc Nền Sức Căng ( Gradient Xanh -> Cam -> Đỏ )
            ctx.beginPath();
            ctx.arc(cx, cy, r, Math.PI, 0, false);
            ctx.lineWidth = 14; ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.stroke();

            // Arc Fill theo chỉ số Tension hiện tại
            const fillAngle = Math.PI - (tension / 100) * Math.PI;
            ctx.beginPath();
            ctx.arc(cx, cy, r, Math.PI, fillAngle, false);
            ctx.lineWidth = 14;
            ctx.strokeStyle = tension > 75 ? "#FF1744" : (tension > 45 ? "#FF9800" : "#4CAF50");
            ctx.stroke();

            // Hiển thị số mét khoảng cách
            ctx.fillStyle = "#FFF";
            ctx.font = "bold 16px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(`${Math.ceil(distance)}m`, cx, cy - 80);
        }

        requestAnimationFrame(draw);
    }

    // Modal Event Handlers
    document.getElementById('restartBtn').addEventListener('click', () => {
        document.getElementById('resultModal').style.display = 'none';
        resetToIdle();
    });

    document.getElementById('openShopBtn').addEventListener('click', () => {
        document.getElementById('shopModal').style.display = 'flex';
    });
    document.getElementById('closeShopBtn').addEventListener('click', () => {
        document.getElementById('shopModal').style.display = 'none';
    });

    function buyItem(req) {
        if (totalKg >= req) {
            totalKg -= req;
            totalKgEl.textContent = totalKg.toFixed(1);
            alert("Đổi quà thành công!");
        } else alert("Chưa đủ Kg cá!");
    }

    draw();
    setInterval(update, 1000 / 60);
</script>
</body>
</html>
