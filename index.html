<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Angler's Bounty - Core Loop Demo</title>
    <style>
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 700px;
            background: linear-gradient(180deg, #1e3c72 0%, #2a5298 50%, #0f2027 100%);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* Flash Screen effect */
        #flash-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            transition: opacity 0.1s ease-out;
        }

        /* Top HUD */
        .top-hud {
            display: flex;
            justify-content: space-between;
            padding: 16px;
            z-index: 10;
            background: rgba(0,0,0,0.3);
        }
        .hud-badge {
            background: rgba(255,255,255,0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        /* Main Canvas */
        canvas { width: 100%; height: 100%; touch-action: none; }

        /* HUD Reeling Mini-Game overlay */
        #reeling-ui {
            position: absolute;
            top: 80px;
            left: 20px;
            right: 20px;
            display: none;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }
        .metric-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
        }

        /* Progress bars */
        .bar-container {
            width: 100%;
            height: 16px;
            background: #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        .bar-fill { height: 100%; width: 0%; transition: width 0.1s linear; }
        #tension-bar { background: linear-gradient(90deg, #4CAF50, #FFEB3B, #F44336); }
        #distance-bar { background: #2196F3; }

        /* QTE Jerk/Stun Button */
        #qte-btn {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #FF9800;
            color: #000;
            border: 4px solid #FFF;
            padding: 18px 32px;
            font-size: 22px;
            font-weight: 900;
            border-radius: 50px;
            box-shadow: 0 0 25px #FF9800;
            cursor: pointer;
            z-index: 30;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulse 0.6s infinite alternate;
        }
        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.15); }
        }

        /* Controls Bottom */
        .controls {
            position: absolute;
            bottom: 24px;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            z-index: 10;
        }
        .btn-main {
            background: linear-gradient(135deg, #d82d8b, #a50064);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 35px;
            box-shadow: 0 8px 25px rgba(216, 45, 139, 0.5);
            cursor: pointer;
        }
        .btn-main:active { transform: scale(0.95); }

        /* Modal screens */
        .modal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 40;
            text-align: center;
            padding: 24px;
        }
        .fish-card {
            background: rgba(255,255,255,0.1);
            border: 2px solid #ffd700;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            width: 80%;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="flash-overlay"></div>

    <!-- HUD -->
    <div class="top-hud">
        <div class="hud-badge">🪱 Vé câu: <span id="ticket-count" style="color: #d82d8b;">10</span></div>
        <div class="hud-badge">⭐ Điểm: <span id="point-count" style="color: #ffd700;">0</span></div>
    </div>

    <!-- UI Reeling Gameplay -->
    <div id="reeling-ui">
        <div class="metric-row">
            <span>Khoảng cách: <span id="dist-text">100</span>m</span>
            <span id="fish-status" style="color: #4CAF50;">Normal</span>
        </div>
        <div class="bar-container">
            <div id="distance-bar" class="bar-fill"></div>
        </div>

        <div class="metric-row" style="margin-top: 8px;">
            <span>Sức căng dây (Tension):</span>
            <span id="tension-text">0%</span>
        </div>
        <div class="bar-container">
            <div id="tension-bar" class="bar-fill"></div>
        </div>
    </div>

    <!-- Quick Time Event (Giật Cầu) -->
    <button id="qte-btn">⚡ GIẬT NGAY!</button>

    <!-- Canvas Engine -->
    <canvas id="gameCanvas" width="420" height="700"></canvas>

    <!-- Main Button -->
    <div class="controls">
        <button id="mainBtn" class="btn-main">THẢ CẦN</button>
    </div>

    <!-- Modal Result -->
    <div id="resultModal" class="modal">
        <h1 id="res-title" style="color: #ffd700;">BẮT ĐƯỢC CÁ!</h1>
        <div class="fish-card">
            <h2 id="res-fish-name">Golden Tuna</h2>
            <p id="res-fish-rarity" style="color: #FF9800; font-weight: bold; margin: 8px 0;">Legendary</p>
            <h3 id="res-fish-weight">42.8 kg</h3>
        </div>
        <p style="margin-bottom: 20px; color: #aaa;">+1 Fishing Ticket | +500 Event Points</p>
        <button id="restartBtn" class="btn-main">CÂU TIẾP</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const mainBtn = document.getElementById('mainBtn');
    const qteBtn = document.getElementById('qte-btn');
    const reelingUI = document.getElementById('reeling-ui');
    const distText = document.getElementById('dist-text');
    const tensionText = document.getElementById('tension-text');
    const fishStatusEl = document.getElementById('fish-status');
    const distBar = document.getElementById('distance-bar');
    const tensionBar = document.getElementById('tension-bar');
    const flashOverlay = document.getElementById('flash-overlay');

    // Game States
    const STATES = { IDLE: 'IDLE', CASTING: 'CASTING', WAITING: 'WAITING', BITE: 'BITE', REELING: 'REELING', RESULT: 'RESULT' };
    let currentState = STATES.IDLE;

    // Spec Variables
    let distance = 100;
    let tension = 0;
    let isHolding = false;
    let currentFish = null;
    let qteActive = false;
    let qteTimer = null;
    let fishStateTimer = 0;
    let fishBehavior = 'Normal'; // Normal, Dash, Struggle, Escape

    // Config độ hiếm cá
    const FISH_DATABASE = [
        { name: "Cá Rô Đồng", rarity: "Common", color: "#81C784", chance: 0.70, pullPower: 1.0, escapeMult: 1.0, weightMin: 0.5, weightMax: 2.0 },
        { name: "Cá Hồi Cam", rarity: "Rare", color: "#64B5F6", chance: 0.90, pullPower: 1.5, escapeMult: 1.3, weightMin: 3.0, weightMax: 8.0 },
        { name: "Cá Ngừ Đại Dương", rarity: "Epic", color: "#BA68C8", chance: 0.98, pullPower: 2.2, escapeMult: 1.8, weightMin: 12.0, weightMax: 25.0 },
        { name: "Golden Tuna", rarity: "Legendary", color: "#FFD54F", chance: 1.00, pullPower: 3.2, escapeMult: 2.5, weightMin: 35.0, weightMax: 60.0 }
    ];

    // Trigger hiệu ứng Rung & Flash
    function triggerFeedback(isFlash = false) {
        if (navigator.vibrate) navigator.vibrate(50);
        if (isFlash) {
            flashOverlay.style.opacity = '0.8';
            setTimeout(() => flashOverlay.style.opacity = '0', 120);
        }
    }

    // Input listeners
    mainBtn.addEventListener('mousedown', () => handleMainPress(true));
    mainBtn.addEventListener('mouseup', () => handleMainPress(false));
    mainBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleMainPress(true); });
    mainBtn.addEventListener('touchend', (e) => { e.preventDefault(); handleMainPress(false); });

    qteBtn.addEventListener('click', handleQTEClick);

    function handleMainPress(pressing) {
        isHolding = pressing;
        if (!pressing) return;

        if (currentState === STATES.IDLE) {
            startCastingPhase();
        }
    }

    // 2. Giai đoạn thả cần
    function startCastingPhase() {
        currentState = STATES.CASTING;
        mainBtn.style.display = 'none';
        
        // Timer 1 - 3s chờ cá
        const waitTime = 1000 + Math.random() * 2000;
        setTimeout(() => {
            if (currentState === STATES.CASTING) triggerFishBite();
        }, waitTime);
    }

    // 3. Cá cắn câu
    function triggerFishBite() {
        currentState = STATES.BITE;
        triggerFeedback(true);

        // RNG chọn loại cá
        const rand = Math.random();
        currentFish = FISH_DATABASE.find(f => rand <= f.chance) || FISH_DATABASE[0];

        // 0.5s sau bắt đầu Reeling
        setTimeout(() => {
            startReelingPhase();
        }, 500);
    }

    // 4. Bắt đầu Mini Game kéo cá
    function startReelingPhase() {
        currentState = STATES.REELING;
        distance = 100;
        tension = 0;
        reelingUI.style.display = 'flex';
        mainBtn.style.display = 'block';
        mainBtn.textContent = "GIỮ ĐỂ THU DÂY";
    }

    // Trigger QTE Giật Cụ
    function triggerQTE() {
        if (qteActive || currentState !== STATES.REELING) return;
        qteActive = true;
        qteBtn.style.transform = 'translate(-50%, -50%) scale(1)';

        // Window 0.8 giây để bấm
        qteTimer = setTimeout(() => {
            if (qteActive) {
                // Thất bại QTE
                qteActive = false;
                qteBtn.style.transform = 'translate(-50%, -50%) scale(0)';
                distance += 10;
                tension += 25;
                fishStatusEl.textContent = "HỤT GIẬT!";
                fishStatusEl.style.color = "#F44336";
            }
        }, 850);
    }

    function handleQTEClick() {
        if (!qteActive) return;
        clearTimeout(qteTimer);
        qteActive = false;
        qteBtn.style.transform = 'translate(-50%, -50%) scale(0)';

        // Giặt thành công
        triggerFeedback(true);
        distance = Math.max(0, distance - 5);
        tension = Math.max(0, tension - 20);
        fishBehavior = 'Stunned';
        fishStatusEl.textContent = "CÁ BỊ CHOÁNG!";
        fishStatusEl.style.color = "#FFEB3B";
    }

    // 5-9. Loop Cập nhật chỉ số
    function update() {
        if (currentState === STATES.REELING) {
            // Cập nhật hành vi cá ngẫu nhiên mỗi 1.5s
            fishStateTimer += 0.016;
            if (fishStateTimer > 1.5) {
                fishStateTimer = 0;
                const behaviors = ['Normal', 'Dash', 'Escape', 'Struggle'];
                fishBehavior = behaviors[Math.floor(Math.random() * behaviors.length)];
                
                if (fishBehavior === 'Struggle' || (currentFish.rarity === 'Legendary' && Math.random() < 0.5)) {
                    triggerQTE();
                }
            }

            // Xử lý thu dây
            if (isHolding) {
                distance -= 0.12; // Thu dây
                tension += 0.35 * currentFish.pullPower;
            } else {
                tension -= 0.5; // Giảm căng khi thả
            }

            // Xử lý hành vi cá tác động
            if (fishBehavior === 'Dash') {
                tension += 0.25;
                fishStatusEl.textContent = "LAO MẠNH!";
                fishStatusEl.style.color = "#FF9800";
            } else if (fishBehavior === 'Escape') {
                distance += 0.08 * currentFish.escapeMult;
                fishStatusEl.textContent = "BỎ CHẠY!";
                fishStatusEl.style.color = "#F44336";
            } else if (fishBehavior === 'Normal') {
                fishStatusEl.textContent = "BÌNH THƯỜNG";
                fishStatusEl.style.color = "#4CAF50";
            }

            // Clamp chỉ số
            distance = Math.max(0, distance);
            tension = Math.max(0, Math.min(100, tension));

            // Cập nhật UI
            distText.textContent = Math.ceil(distance);
            tensionText.textContent = `${Math.ceil(tension)}%`;
            distBar.style.width = `${(distance / 120) * 100}%`;
            tensionBar.style.width = `${tension}%`;

            // 10 & 12. Điều kiện Thắng / Thua
            if (distance <= 0) {
                finishGame(true);
            } else if (tension >= 100 || distance > 120) {
                finishGame(false);
            }
        }
    }

    function finishGame(isSuccess) {
        currentState = STATES.RESULT;
        reelingUI.style.display = 'none';
        mainBtn.style.display = 'none';
        qteBtn.style.transform = 'translate(-50%, -50%) scale(0)';

        const modal = document.getElementById('resultModal');
        modal.style.display = 'flex';

        if (isSuccess) {
            triggerFeedback(true);
            const weight = (currentFish.weightMin + Math.random() * (currentFish.weightMax - currentFish.weightMin)).toFixed(1);
            document.getElementById('res-title').textContent = "BẮT ĐƯỢC CÁ!";
            document.getElementById('res-title').style.color = "#ffd700";
            document.getElementById('res-fish-name').textContent = currentFish.name;
            document.getElementById('res-fish-rarity').textContent = currentFish.rarity;
            document.getElementById('res-fish-rarity').style.color = currentFish.color;
            document.getElementById('res-fish-weight').textContent = `${weight} kg`;
        } else {
            document.getElementById('res-title').textContent = "CÁ ĐÃ THOÁT!";
            document.getElementById('res-title').style.color = "#F44336";
            document.getElementById('res-fish-name').textContent = "ĐỨT DÂY CÂU";
            document.getElementById('res-fish-rarity').textContent = "Thất bại";
            document.getElementById('res-fish-weight').textContent = "0 kg";
        }
    }

    document.getElementById('restartBtn').addEventListener('click', () => {
        document.getElementById('resultModal').style.display = 'none';
        currentState = STATES.IDLE;
        mainBtn.style.display = 'block';
        mainBtn.textContent = "THẢ CẦN";
    });

    // Render Canvas
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Mặt nước
        ctx.fillStyle = "#1e3c72";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Hiệu ứng phao câu
        if (currentState === STATES.CASTING || currentState === STATES.BITE) {
            ctx.fillStyle = currentState === STATES.BITE ? "#FF1744" : "#FF9800";
            ctx.beginPath();
            ctx.arc(canvas.width / 2, 350, currentState === STATES.BITE ? 14 : 10, 0, Math.PI * 2);
            ctx.fill();

            if (currentState === STATES.BITE) {
                ctx.fillStyle = "#FFF";
                ctx.font = "bold 30px sans-serif";
                ctx.fillText("!", canvas.width / 2 - 5, 320);
            }
        }

        requestAnimationFrame(draw);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
